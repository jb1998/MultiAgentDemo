# Production stack — run from project root:
#   docker compose up --build
# Open http://localhost:5173

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: multiagent-backend
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/storage.db
      SECRET_KEY: ${SECRET_KEY:-dev-docker-secret-change-in-production}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost
      RATE_LIMIT: ${RATE_LIMIT:-100/minute}
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: multiagent-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
